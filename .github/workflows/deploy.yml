name: Deploy to Azure Container App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  RESOURCE_GROUP: rg-mortware
  CONTAINERAPP_NAME: app-songbook
  IMAGE_NAME: mortware/songbook

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            docker.io/${{ env.IMAGE_NAME }}:latest

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.APPSONGBOOK_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.APPSONGBOOK_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.APPSONGBOOK_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name "${{ env.CONTAINERAPP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --image "docker.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
